body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;overflow:hidden}

#topbar h1{font-size:18px;color:#32D74B}

.pace{font-size:11px;color:#FF9F0A}

#controls .row{display:flex;gap:8px;margin-bottom:8px}
#controls .row:last-child{margin-bottom:0}
.btn{flex:1;padding:12px 8px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.btn:active{opacity:.7}
.bg{background:#32D74B;color:#000}.br{background:#FF453A;color:#fff}.bb{background:#0A84FF;color:#fff}.bo{background:#FF9F0A;color:#000}.bk{background:#333;color:#fff}.bp{background:#BF5AF2;color:#fff}
#bikeCount{position:fixed;top:52px;right:12px;z-index:1000;background:#32D74B;color:#000;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:700}
#toast{display:none;position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:3000;background:#32D74B;color:#000;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;white-space:nowrap}
#bayPanel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(0,0,0,.95);padding:20px;overflow-y:auto}
#bayPanel h2{color:#32D74B;margin-bottom:16px}
.bay-item{background:#222;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.bay-item.done{opacity:.5}
.bay-name{font-size:15px;font-weight:500}
.bay-status{font-size:12px;color:#aaa;margin-top:2px}
.bay-actions{display:flex;gap:6px}
.bay-actions button{padding:6px 10px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.close-panel{position:fixed;top:16px;right:16px;z-index:2001;background:#FF453A;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer}
.popup-overlay{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;background:#222;padding:20px;border-radius:14px;text-align:center;min-width:280px}
.popup-overlay button{display:block;width:250px;margin:8px auto 0;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.popup-overlay textarea{width:250px;height:70px;padding:10px;border:1px solid #555;border-radius:8px;background:#111;color:#fff;font-size:14px;resize:none;margin-top:8px}
.popup-overlay input{width:250px;padding:10px;border:1px solid #555;border-radius:8px;background:#111;color:#fff;font-size:16px;margin:10px 0}
#addBayMode{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1500;background:rgba(50,212,75,.9);color:#000;padding:12px 24px;border-radius:12px;font-size:15px;font-weight:700;pointer-events:none}
</style>

lat:51.542987,lng:-0.218791},{name:"College Road (Mid)",lat:51.53374,lng:-0.22561},{name:"College Road (North)",lat:51.533638,lng:-0.225675}];
var STORAGE="limebay_v8",SHIFT_KEY="limebay_shift",CENTER=[51.5385,-0.2150];
var map,userMarker,bikeMarkers=[],bayMarkers={},clusterMarkers=[];
var bays=JSON.parse(localStorage.getItem(STORAGE)||"null");

function mkI(e,s){return L.divIcon({html:"<div style='font-size:"+s+"px;text-align:center;line-height:1'>"+e+"</div>",className:"",iconSize:[s,s],iconAnchor:[s/2,s/2]})}
function clI(n){return L.divIcon({html:"<div style='background:#FF9F0A;color:#000;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border:2px solid #fff'>"+n+"</div>",className:"",iconSize:[34,34],iconAnchor:[17,17]})}
var bikeI=mkI("\ud83d\udfe2",18),bayI=mkI("\ud83d\udd34",26),tidyI=mkI("\ud83e\uddf9",26),tidiedI=mkI("\u2705",26),userI=mkI("\ud83d\udfe5",24);
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},3000)}
if(navigator.geolocation){navigator.geolocation.watchPosition(function(p){userLat=p.coords.latitude;userLng=p.coords.longitude;if(userMarker)userMarker.setLatLng([userLat,userLng]);else userMarker=L.marker([userLat,userLng],{icon:userI}).addTo(map)},null,{enableHighAccuracy:true})}
function centerOnMe(){map.setView([userLat,userLng],15)}
function dist(a,b,c,d){var R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function nearestBay(){var u=bays.filter(function(b){return!b.tidyState});if(!u.length){toast("All bays tidied!");return}var n=null,m=Infinity;u.forEach(function(b){var d2=dist(userLat,userLng,b.lat,b.lng);if(d2<m){m=d2;n=b}});var i=bays.indexOf(n);map.setView([n.lat,n.lng],16);if(bayMarkers[i])bayMarkers[i].openPopup();var ds=m<1000?Math.round(m)+"m":(m/1000).toFixed(1)+"km";toast(n.name+" - "+ds+" away")}
function openTidyPopup(i){pendingTidyIdx=i;document.getElementById("tidyPopupTitle").textContent=bays[i].name;document.getElementById("tidyPopupLabel").textContent=bays[i].isRedStar?"Red star bay":"Detected bay";document.getElementById("tidyPopup").style.display="block"}
function confirmTidy(state){if(pendingTidyIdx===null)return;if(!shiftStart){shiftStart=Date.now();localStorage.setItem(SHIFT_KEY,shiftStart)}var b=bays[pendingTidyIdx];b.tidyState=state;b.checkedAt=Date.now();var now=new Date();var d=now.toLocaleDateString("en-GB");var t=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});var label=b.isRedStar?" red star":"";var msg=b.name+label+"\n"+state+"\n"+d+" "+t;var ta=document.getElementById("copyText");ta.value=msg;document.getElementById("copyPopup").style.display="block";ta.focus();ta.select();toast(b.name+" - "+state);saveBays();
var camStream=null,camBayIdx=null,camBlob=null,camMsg="";
function openCamera(idx){
  camBayIdx=idx;
  var bay=bays[idx];
  document.getElementById("cameraTitle").textContent="Photo: "+bay.name;
  document.getElementById("cameraPopup").style.display="block";
  document.getElementById("camPreview").style.display="none";

function takePhoto(){
  var video=document.getElementById("camVideo");
  var canvas=document.getElementById("camCanvas");
  var ctx=canvas.getContext("2d");
  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  ctx.drawImage(video,0,0);
  if(camStream){camStream.getTracks().forEach(function(t){t.stop()});camStream=null;}
  video.style.display="none";
  var bay=bays[camBayIdx];
  var now=new Date();
  var dateStr=now.toLocaleDateString("en-GB");
  var timeStr=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  var lines=[bay.name+(bay.isRedStar?" [RED STAR]":""),dateStr+" "+timeStr,"Lat: "+bay.lat.toFixed(5)+" Lng: "+bay.lng.toFixed(5)];
  var fontSize=Math.round(canvas.width*0.035);
  ctx.font="bold "+fontSize+"px -apple-system,sans-serif";
  var padding=fontSize*0.6;
  var lineHeight=fontSize*1.4;
  var boxHeight=lines.length*lineHeight+padding*2;
  var boxY=canvas.height-boxHeight-padding;
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,boxY,canvas.width,boxHeight+padding);
  ctx.fillStyle="#FFFFFF";
  ctx.shadowColor="rgba(0,0,0,0.8)";
  ctx.shadowBlur=4;
  for(var li=0;li<lines.length;li++){
    ctx.fillText(lines[li],padding,boxY+padding+lineHeight*(li+0.8));
  }
  ctx.shadowBlur=0;
  canvas.toBlob(function(blob){
    camBlob=blob;
    var url=URL.createObjectURL(blob);
    document.getElementById("camPreview").src=url;
    document.getElementById("camPreview").style.display="block";
    canvas.style.display="none";
    document.getElementById("cameraButtons").style.display="none";
    document.getElementById("shareButtons").style.display="block";
    var label=bay.isRedStar?" red star":"";
    var state=bay.tidyState||"tidy";
    camMsg=bay.name+label+"\n"+state+"\n"+dateStr+" "+timeStr;
  },"image/jpeg",0.85);
}
function shareToSlack(){
  if(!camBlob)return;
  var file=new File([camBlob],bays[camBayIdx].name.replace(/ /g,"_")+"_"+Date.now()+".jpg",{type:"image/jpeg"});
  if(navigator.share){
    navigator.share({text:camMsg,files:[file]}).then(function(){
      toast("Shared!");closeCam();
    }).catch(function(e){
      if(e.name!=="AbortError")toast("Share failed");
    });
  }else{
    toast("Share not supported - use Save");
  }
}
function savePhoto(){
  if(!camBlob)return;
  var a=document.createElement("a");
  a.href=URL.createObjectURL(camBlob);
  a.download=bays[camBayIdx].name.replace(/ /g,"_")+"_"+Date.now()+".jpg";
  a.click();
  toast("Photo saved!");
}

  document.getElementById("camVideo").style.display="none";
}

var camStream=null,camBayIdx=null,camBlob=null,camMsg="",camInterval=null,camLat=0,camLng=0,camAddr="";

function takePhoto(){
  var video=document.getElementById("camVideo");

  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  ctx.drawImage(video,0,0);

  video.style.display="none";
  var bay=bays[camBayIdx];

  var dateStr=now.toLocaleDateString("en-GB");

  }

  },"image/jpeg",0.85);
}
